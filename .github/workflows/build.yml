name: Build PingMonitor Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: version
      shell: bash
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow
    
    - name: Build executable
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        if [ "${{ runner.os }}" = "Windows" ]; then
          pyinstaller --onefile --windowed --name PingMonitor-v$VERSION --icon=pingMonitorICON.png --add-data "devices.example.json;." pingMonitor.py
        else
          pyinstaller --onefile --windowed --name PingMonitor-v$VERSION --icon=pingMonitorICON.png --add-data "devices.example.json:." pingMonitor.py
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PingMonitor-${{ runner.os }}
        path: dist/PingMonitor*